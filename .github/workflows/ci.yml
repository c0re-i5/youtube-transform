name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (no heavy ML deps)
        # We only install dev tools + click/rich/yt-dlp so the pure-logic
        # test suite runs fast without pulling torch/whisperx into CI.
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff click rich "yt-dlp>=2024.5.0"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Test
        run: pytest -q
